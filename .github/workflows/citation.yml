name: Citation preview

on:
  push:
    branches: [ main ]
    paths: ['CITATION.bib', '.github/workflows/citation.yml']
  pull_request:
    branches: [ main ]
    paths: ['CITATION.bib', '.github/workflows/citation.yml']

permissions:
  contents: read

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check for non-ASCII characters
        run: |
          if [ -f "CITATION.bib" ]; then
          python3 -c 'open("CITATION.bib", encoding="ascii").read()'
          fi
      - name: Install LaTeX
        run: |
          if [ -f "CITATION.bib" ]; then
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-publishers
          fi
      - name: Run LaTeX
        run: |
          if [ -f "CITATION.bib" ]; then
          arr=(${GITHUB_REPOSITORY//\// })
          export REPO=${arr[1]}
          cat <<- EOF > preview.tex
          \documentclass[preprint,aps,physrev,notitlepage]{revtex4-2}
          \usepackage{hyperref}
          \begin{document}
          \title{\texttt{$REPO} BibTeX test}
          \maketitle
          \noindent
          \texttt{$REPO}
          \cite{$REPO}
          \bibliography{CITATION}
          \end{document}
          EOF
          pdflatex preview
          fi
      - name: Run BibTeX
        run: |
          if [ -f "CITATION.bib" ]; then
          bibtex preview
          fi
      - name: Re-run LaTeX
        run: |
          if [ -f "CITATION.bib" ]; then
          pdflatex preview
          pdflatex preview
          fi
      - name: Upload PDF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preview.pdf
          path: preview.pdf
